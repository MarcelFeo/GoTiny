services:
  - type: web
    name: gotiny-api
    runtime: docker
    plan: free
    dockerContext: .
    envVars:
      - key: DB_URL
        fromDatabase:
          name: gotiny-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: gotiny-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: gotiny-db
          property: password